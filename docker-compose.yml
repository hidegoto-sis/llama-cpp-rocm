version: "3.9"

services:
  llama-cpp:
    build: .
    container_name: llama-cpp
    restart: always

    # ホストの ROCm をコンテナに渡す（Vega で GPU を使うために必須）
    volumes:
      - /opt/rocm:/opt/rocm
      - /models:/models   # モデルを置く場所

    # GPU デバイスを渡す
    devices:
      - /dev/kfd
      - /dev/dri

    ports:
      - "8081:8081"
